
# Port für den Notenberechnungs-Service
server:
  port: 8083


# Name der Spring Boot Anwendung
spring:
  application:
    name: notenberechnung-service

# Module per Prüfungsordnung (PO) - Seed data configuration
# Die Modul-Daten sind ausgelagert in ModulesSeedData.java Klasse
# Für Runtime-Änderungen können diese über die API gespeichert werden

# Eigene App-Konfiguration
app:
  # Konfiguration wird aus ModulesSeedData geladen
  modules-source: class


# JWT-Konfiguration für Authentifizierung
jwt:
  # WICHTIG: In Produktion MUSS das Secret über Umgebungsvariable gesetzt werden!
  # Das Secret muss exakt mit dem Auth-Service übereinstimmen.
  secret: ${JWT_SECRET:meinSuperGeheimerSchluessel1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ}


# GraphQL Client-Konfiguration für Noten-Modul-Service
graphql:
  client:
    # URL des Noten-Modul-Service (Standard: lokal)
    url: "http://localhost:8082/graphql"

