server:
  port: 8081

spring:
  application:
    name: user_service

  output:
    ansi:
      enabled: ALWAYS

  web:
    resources:
      add-mappings: false

jwt:
  secret: ${JWT_SECRET:meinSuperGeheimerSchluessel1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

tenant:
  service:
    base-url: ${TENANT_SERVICE_BASE_URL:http://localhost:8084}

auth:
  service:
    base-url: ${AUTH_SERVICE_BASE_URL:http://localhost:8085}

logging:
  level:
    root: INFO
    "[com.university.user_service]": DEBUG
    "[org.springframework.security]": DEBUG
    "[org.springframework.web]": DEBUG

# API-Key Authentication für Service-to-Service Kommunikation
apikey:
  key: ${API_SERVICE_KEY:user-service-key-67890-secure-key}
  name: ${API_SERVICE_NAME:user-service}
  allowed:
    auth-service: ${API_SERVICE_KEY_AUTH:auth-service-key-12345-secure-key}
    user-service: ${API_SERVICE_KEY_USER:user-service-key-67890-secure-key}
    tenant-service: ${API_SERVICE_KEY_TENANT:tenant-service-key-abcde-secure-key}
    noten-modulverwaltung-service: ${API_SERVICE_KEY_NOTEN_MODUL:noten-modulverwaltung-service-key-xyz123}

